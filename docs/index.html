<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#040812">
  <title>VoiceClutch</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #040812; /* Subtle dark blue tint */
    }

    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background-color: var(--bg-color);
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: none;
    }

    /* Subtle monochrome background glow */
    .glow-container {
      position: absolute; inset: 0; overflow: hidden; z-index: 1; pointer-events: none;
    }

    .glow {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 90% 110%, rgba(229, 168, 139, 0.45) 0%, rgba(186, 125, 110, 0.28) 35%, rgba(110, 65, 70, 0.15) 65%, rgba(60, 40, 50, 0.05) 85%, transparent 100%),
        radial-gradient(circle at 10% -10%, rgba(30, 50, 80, 0.45) 0%, rgba(20, 35, 60, 0.25) 50%, rgba(10, 20, 35, 0.1) 80%, transparent 100%);
      filter: blur(30px);
      transform: scale(1.1);
    }

    /* Monochrome cinematic grain overlay */
    .grain-layer {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.25' numOctaves='8' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 1;
      mix-blend-mode: overlay;
    }

    /* Footer Navigation */
    .footer {
      padding: 2.5rem;
      display: flex; justify-content: center; align-items: center;
      z-index: 100;
      margin-top: auto;
    }

    .footer-links {
      display: flex; gap: 2.5rem;
    }

    .footer-links a {
      color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: #fff; }

    .hero-logo {
      width: 250px; height: 250px;
      margin-top: 6vh;
      margin-bottom: 2rem;
    }

    /* Centered Hero Content */
    .hero {
      position: relative; z-index: 10;
      flex: 1; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      text-align: center; padding: 0 1rem;
    }

    h1 {
      font-size: 4rem; font-weight: 600; letter-spacing: -0.04em;
      margin: 0 0 1.25rem; color: #ffffff;
      max-width: 900px; line-height: 1.05;
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff3dd 0%, #6c6c80 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.subtitle {
      font-size: 1.2rem; font-weight: 400; color: rgba(255, 255, 255, 0.5);
      margin: 0 0 3rem; line-height: 1.6; max-width: 600px;
    }

    .actions { display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: #ffffff; color: #000000;
      padding: 0.85rem 1.25rem; border-radius: 9999px;
      text-decoration: none; font-weight: 500; font-size: 0.95rem;
      transition: box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(255,255,255,0.1);
      width: 240px;
      box-sizing: border-box;
    }

    .btn-primary:hover { box-shadow: 0 6px 24px rgba(255,255,255,0.2); }

    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(255,255,255,0.03); color: #ffffff;
      padding: 0.85rem 1.25rem; border-radius: 9999px;
      text-decoration: none; font-weight: 500; font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: background 0.2s, border-color 0.2s;
      width: 240px;
      box-sizing: border-box;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      .hero-logo { width: 160px; height: 160px; margin-bottom: 1.5rem; }
      h1 { font-size: 3rem; }
      p.subtitle { font-size: 1.1rem; }
      .footer { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- Subtle center glow -->
  <div class="glow-container">
    <div class="glow"></div>
  </div>

  <!-- Monochrome grain -->
  <div class="grain-layer"></div>

  <main class="hero">
    <img src="VoiceClutch.png" alt="VoiceClutch Logo" class="hero-logo">
    <h1 class="gradient-text">VoiceClutch<br /></h1>
    <p class="subtitle">Private, free, and on-device voice dictation app for macOS with low-latency streaming transcription and LLM-powered corrections</p>

        Open Source
      </a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://vadimmelnicuk.github.io/voiceclutch/privacy-policy/" target="_blank">Privacy</a>
    </div>
  </footer>

</html>
